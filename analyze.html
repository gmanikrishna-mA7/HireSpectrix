<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyze Job</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">Hire<span>Spectrix</span></div>
    <nav class="nav">
        <a href="index.html">Home</a>
    </nav>
</header>

<!-- MAIN CONTENT -->
<div class="container analyze-container">
    <h2>Job Analysis Form</h2>
    <p class="subtitle">Enter job details to check if the job is safe or suspicious.</p>

    <form id="jobForm">

        <label for="jobTitle">Job Title</label>
        <input type="text" id="jobTitle" name="jobTitle" placeholder="e.g. Software Engineer" required>

        <label for="company">Company Name</label>
        <input type="text" id="company" name="company" placeholder="e.g. TCS" required>

        <label for="salary">Salary (per month)</label>
        <div class="salary-input">
            <input type="text" id="salary" name="salary" placeholder="e.g. 50,000 or 50,000-60,000" required>
            <select id="currency" name="currency" required>
                <option value="INR">₹ INR</option>
                <option value="USD">$ USD</option>
                <option value="EUR">€ EUR</option>
            </select>
        </div>

        <label for="email">Contact Email</label>
        <input type="email" id="email" name="email" placeholder="e.g. hr@company.com" required>

        <label for="website">Company Website</label>
        <input type="text" id="website" name="website" placeholder="e.g. www.company.com or company.com" required>

        <label for="description">Job Description</label>
        <textarea id="description" name="description" rows="4" placeholder="Enter job details" required></textarea>

        <label>Registration Fee Asked?</label>
        <div class="radio-group">
            <label><input type="radio" name="fee" value="yes" required> Yes</label>
            <label><input type="radio" name="fee" value="no"> No</label>
        </div>

        <button type="submit">Analyze Job</button>

    </form>
</div>

<script src="script.js"></script>
</body>
</html>
