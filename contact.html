<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - HireSpectrix</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">Hire<span>Spectrix</span></div>
    <nav class="nav">
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="analyze.html">Analyze</a>
        <a href="support.html">Support Us</a>
    </nav>
</header>

<!-- CONTACT FORM -->
<div class="container contact-container">
    <h2>Contact Us</h2>
    <p class="subtitle">Have questions or feedback? Reach out to us!</p>

    <form id="contactForm">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="John Doe" required>

        <label for="email">Your Email</label>
        <input type="email" id="email" name="email" placeholder="john@example.com" required>

        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" placeholder="Subject" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Write your message..." required></textarea>

        <button type="submit">Send Message</button>
        <!-- After the submit button -->
        <div id="contactMessage" class="contact-message"></div>
    </form>
</div>

<script src="contact.js"></script>
</body>
</html>
